<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl World Gallery</title>
    <style>
        @keyframes rainbow { 
            0% {color: #ff0000;} 20% {color: #ff8000;} 40% {color: #ffff00;} 
            60% {color: #00ff00;} 80% {color: #0000ff;} 100% {color: #ff0000;} 
        }
        body { background: #1a2a3a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        h1 { animation: rainbow 5s infinite; text-shadow: 2px 2px black; cursor: pointer; font-size: 2.5em; font-weight: bold; }
        .admin-box { display: none; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; border: 2px solid gold; margin-top: 20px; }
        button { background: gold; padding: 15px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #gallery { display: flex; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        #gallery img { width: 140px; height: 140px; object-fit: cover; margin: 8px; border-radius: 12px; border: 2px solid #00ffcc; }
    </style>
</head>
<body>
    <h1 onclick="checkClicks()">BRAWL STARS WORLD</h1>
    <p>Твои лучшие моменты Brawl Stars</p>
    
    <div id="gallery">
        <img src="images/1.jpg" onerror="this.style.display='none'">
        <img src="images/2.jpg" onerror="this.style.display='none'">
        <img src="images/3.jpg" onerror="this.style.display='none'">
        <img src="images/4.jpg" onerror="this.style.display='none'">
        <img src="images/5.jpg" onerror="this.style.display='none'">
    </div>

    <div id="admin-panel" class="admin-box">
        <h3>АДМИН-ПАНЕЛЬ АКТИВНА</h3>
        <p>Загрузи фото в папку images на GitHub с именами 1.jpg, 2.jpg и т.д.</p>
        <button onclick="location.reload()">ОБНОВИТЬ ГАЛЕРЕЮ</button>
    </div>

    <script>
        let clicks = 0;
        function checkClicks() {
            clicks++;
            if (clicks === 3) {
                let pass = prompt("Введите пароль:");
                if (pass === "termux58763") {
                    document.getElementById("admin-panel").style.display = "block";
                    alert("Доступ открыт!");
                }
                clicks = 0;
            }
        }
    </script>
</body>
</html>
