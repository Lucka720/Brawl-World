<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl World VIP</title>
    <style>
        @keyframes rainbow { 0% {color: #f00;} 50% {color: #0f0;} 100% {color: #f00;} }
        body { background: #1a2a3a; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        .main-ui { display: block; }
        .vip-ui { display: none; background: #000; padding: 20px; border: 5px solid gold; border-radius: 20px; }
        .btn { display: inline-block; padding: 15px 25px; margin: 10px; border-radius: 50px; font-weight: bold; cursor: pointer; border: none; text-decoration: none; }
        .btn-vip { background: gold; color: black; box-shadow: 0 0 15px gold; }
        #gallery, #vip-gallery { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 20px; }
        .img-container { width: 100%; max-width: 500px; border-radius: 15px; border: 3px solid #00ffcc; overflow: hidden; display: none; }
        img { width: 100%; height: auto; }
    </style>
</head>
<body>
    <div id="main-content">
        <h1 onclick="checkAdmin()" style="animation: rainbow 3s infinite; cursor: pointer;">BRAWL STARS WORLD</h1>
        <button class="btn btn-vip" onclick="enterVIP()">🌟 ВВЕСТИ КЛЮЧ ДОСТУПА</button>
        <div id="gallery"></div>
    </div>
    <div id="vip-room" class="vip-ui">
        <h1 style="color: gold;">💎 VIP ZONE 💎</h1>
        <button class="btn" style="background: white;" onclick="document.getElementById("vip-room").style.display="none";document.getElementById("main-content").style.display="block"">⬅ НАЗАД</button>
        <div id="vip-gallery"></div>
    </div>
    <script>
        const validKeys = ["VIP-777", "GOLD-123", "BRAWL-99", "SECRET-55"];
        window.onload = function() {
            if (localStorage.getItem("vip_access") === "true") { showVIP(); }
            loadMainGallery();
        };
        function enterVIP() {
            let userKey = prompt("Введите ваш личный ключ:");
            if (validKeys.includes(userKey)) {
                localStorage.setItem("vip_access", "true");
                alert("Ключ принят! VIP доступ открыт постоянно.");
                showVIP();
            } else { alert("Ключ недействителен!"); }
        }
function exitVIP() { document.getElementById("vip-room").style.display = "none"; document.getElementById("main-content").style.display = "block"; }
        function showVIP() {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('vip-room').style.display = 'block';
            loadVIPGallery();
        }
        function loadMainGallery() {
            const g = document.getElementById('gallery');
            for (let i = 1; i <= 218; i++) {
                const div = document.createElement('div');
                div.className = 'img-container';
                const img = document.createElement('img');
                img.src = "images/" + i + ".jpg";
                img.onload = () => div.style.display = 'block';
                div.appendChild(img);
                g.appendChild(div);
            }
        }
        function loadVIPGallery() {
            const vg = document.getElementById('vip-gallery');
            if (vg.children.length > 0) return;
            for (let i = 1; i <= 100; i++) {
                const div = document.createElement('div');
                div.className = 'img-container';
                div.style.borderColor = 'gold';
                const img = document.createElement('img');
                img.src = "images/vip/" + i + ".jpg";
                img.onload = () => div.style.display = 'block';
                div.appendChild(img);
                vg.appendChild(div);
            }
        }
        let clicks = 0;
        function checkAdmin() {
            clicks++;
            if (clicks === 3) {
                let p = prompt("Админ-пароль:");
                if (p === "termux58763") alert("Админка активна");
                clicks = 0;
            }
        }
    </script>
</body>
</html>
